<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;family=DM+Sans:wght@400&amp;display=swap');
    </style>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="93"/>
    </clipPath>
  </defs>

  <!-- Cream background -->
  <circle cx="100" cy="100" r="96" fill="#FAF5EE"/>

  <!-- Blue border ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#9BBDD4" stroke-width="5"/>

  <!-- ── Gold illustration ── -->
  <g fill="none" stroke="#C8963E" stroke-linecap="round" stroke-linejoin="round">

    <!-- Cloche dome -->
    <path d="M 48 118 Q 100 76 152 118" stroke-width="1.6"/>

    <!-- Cloche base line -->
    <line x1="40" y1="118" x2="160" y2="118" stroke-width="1.6"/>

    <!-- Cloche lower rim -->
    <path d="M 44 123 Q 100 128 156 123" stroke-width="1.3"/>

    <!-- Knob stem -->
    <line x1="100" y1="76" x2="100" y2="68" stroke-width="1.5"/>

    <!-- Knob oval -->
    <ellipse cx="100" cy="65" rx="5.5" ry="3.5" stroke-width="1.4"/>

    <!-- Wrist left side → flows into pinky -->
    <path d="M 95 62 C 92 55 89 48 85 42" stroke-width="1.4"/>

    <!-- Wrist right side → flows into thumb -->
    <path d="M 105 62 C 108 55 112 48 115 42" stroke-width="1.4"/>

    <!-- Palm base arc -->
    <path d="M 84 44 C 92 49 108 49 116 44" stroke-width="1.3"/>

    <!-- Pinky (leftmost, shorter) -->
    <path d="M 84 44 C 82 36 82 27 84 20" stroke-width="1.3"/>

    <!-- Ring finger -->
    <path d="M 91 41 C 90 32 90 23 92 15" stroke-width="1.3"/>

    <!-- Middle finger (tallest) -->
    <path d="M 99 40 C 99 30 99 21 100 13" stroke-width="1.3"/>

    <!-- Index finger -->
    <path d="M 107 41 C 108 32 109 23 107 15" stroke-width="1.3"/>

    <!-- Thumb (rightmost, angled out, shorter) -->
    <path d="M 116 44 C 119 37 121 28 118 21" stroke-width="1.3"/>

  </g>

  <!-- "Tarela's kitchen" script -->
  <text x="100" y="150"
        text-anchor="middle"
        font-family="'Dancing Script', Snell Roundhand, 'Brush Script MT', cursive"
        font-size="23"
        font-weight="700"
        fill="#1A1208">Tarela's kitchen</text>

  <!-- Tagline -->
  <text x="100" y="167"
        text-anchor="middle"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="6.2"
        fill="#999999"
        letter-spacing="1.4">TASTE THE SPICE, FEEL THE CULTURE!</text>
</svg>
